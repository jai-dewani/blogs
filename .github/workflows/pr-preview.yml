name: PR Preview

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.11.1'  # Specific LTS version to avoid deprecation warnings
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile --silent
      
      - name: Build Gatsby for PR Preview
        run: npm run build
        env:
          NODE_OPTIONS: "--no-deprecation"
          PATH_PREFIX: "/preview/pr-${{ github.event.number }}"
        
      - name: Deploy PR Preview
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          destination_dir: preview/pr-${{ github.event.number }}
          keep_files: true
          
      - name: Comment PR with preview link
        uses: actions/github-script@v6
        with:
          script: |
            const previewUrl = `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview/pr-${{ github.event.number }}/`;
            
            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.login === 'github-actions[bot]' && 
              comment.body.includes('PR Preview Ready!')
            );
            
            const commentBody = `🚀 **PR Preview Ready!**\n\n📖 View your changes: ${previewUrl}\n\n_This preview updates automatically with new commits._`;
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }